<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, email=no">
    <title>Silencio Mental</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        #unity-container { width: 100%; height: 100%; background: #000; }
        #unity-canvas { width: 100% !important; height: 100% !important; display: block; background: #000; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/silencio-mental.loader.js";
        const config = {
            dataUrl: buildUrl + "/silencio-mental.data.unityweb",
            frameworkUrl: buildUrl + "/silencio-mental.framework.js.unityweb",
            codeUrl: buildUrl + "/silencio-mental.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Menteando",
            productName: "Silencio Mental",
            productVersion: "1.0",
            showBanner: () => {}
        };
        const canvas = document.querySelector("#unity-canvas");
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config).catch((error) => {
                console.error("Error:", error);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
