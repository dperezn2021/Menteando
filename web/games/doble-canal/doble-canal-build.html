<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doble Canal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            background: #000;
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/catalogoJuegos.js"></script>
    <script src="../../js/perfil.js"></script>
    <script src="../../js/storage.js"></script>
    <script src="../../js/datosPerfil.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/doble-canal.loader.js";
        const config = {
            dataUrl: buildUrl + "/doble-canal.data.unityweb",
            frameworkUrl: buildUrl + "/doble-canal.framework.js.unityweb",
            codeUrl: buildUrl + "/doble-canal.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Menteando",
            productName: "Doble Canal",
            productVersion: "1.0",
            showBanner: () => { }
        };
        const canvas = document.querySelector("#unity-canvas");
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => { createUnityInstance(canvas, config).catch(alert); };
        document.body.appendChild(script);
    </script>
</body>

</html>
