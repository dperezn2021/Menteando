<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menteando - rosco-express">
    <meta name="keywords" content="menteando, rosco-express, atencion selectiva, reflejos">
    <meta name="author" content="Daniel Perez Navarro">
    <title>Menteando | rosco-express</title>
    <link rel="icon" href="../../assets/img/logo.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="../../css/unity-clean.css">

    <script>
        (() => {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const useDark = storedTheme ? storedTheme === 'dark' : prefersDark;

            document.documentElement.classList.toggle('dark', useDark);
            document.documentElement.classList.toggle('light', !useDark);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/catalogoJuegos.js"></script>
    <script src="../../js/perfil.js"></script>
    <script src="../../js/storage.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#3b82f6',
                            secondary: '#6366f1',
                            accent: '#f59e0b'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-neutral-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-sans antialiased overflow-x-hidden">
    <header id="standalone-header" class="hidden w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3 lg:py-4 flex flex-col lg:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 flex-shrink-0">
                <img src="../../assets/juegos/rosco-express.png" alt="Logo rosco-express" class="w-10 h-10 md:w-12 md:h-12 rounded-xl object-cover" />
                <div class="flex flex-col leading-tight text-left">
                    <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Rosco Express</h1>
                    <p class="text-xs md:text-sm font-normal text-slate-500 dark:text-slate-300">Modo juego completo</p>
                </div>
            </div>

            <nav class="flex flex-row items-center justify-center gap-2 md:gap-3">
                <a href="rosco-express-page.html" class="inline-flex items-center justify-center px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold hover:border-blue-500 hover:text-blue-500 transition-colors">Volver a la ficha</a>
                <a href="../../games.html" class="inline-flex items-center justify-center px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold hover:border-blue-500 hover:text-blue-500 transition-colors">Catalogo</a>
            </nav>

            <div class="flex items-center gap-3">
                <a href="../../perfil.html" class="flex items-center gap-2">
                    <span id="perfil-apodo-header" class="text-md md:text-xl font-normal text-slate-500 dark:text-slate-300"></span>
                    <div class="w-10 h-10 md:w-12 md:h-12 rounded-full overflow-hidden border-2 border-blue-500 bg-blue-500/10 flex items-center justify-center">
                        <img id="perfil-avatar-header" src="../../assets/icon/usuario.webp" alt="Avatar de usuario" class="w-full h-full object-cover" />
                    </div>
                </a>
                <button id="theme-toggle-btn" class="text-lg md:text-2xl text-slate-900 dark:text-white hover:text-blue-500 transition-colors" type="button" aria-label="Cambiar tema"></button>
            </div>
        </div>
    </header>

    <main id="unity-main" class="min-h-screen flex items-center justify-center p-4 sm:p-6 box-border">
        <div id="unity-container">
            <canvas id="unity-canvas" tabindex="-1"></canvas>
        </div>
    </main>

    <script>
        const isStandalone = window.top === window.self;
        const header = document.getElementById('standalone-header');
        const main = document.getElementById('unity-main');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const root = document.documentElement;
        const perfil = typeof getperfil === 'function' ? getperfil() : null;
        const headerAvatar = document.getElementById('perfil-avatar-header');
        const headerApodo = document.getElementById('perfil-apodo-header');

        if (perfil?.avatar && headerAvatar) headerAvatar.src = perfil.avatar.replace("../", "../../../");
        if (perfil?.apodo && headerApodo) headerApodo.textContent = perfil.apodo;

        const syncThemeButton = () => {
            const isDark = root.classList.contains('dark');
            themeToggleBtn.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
            themeToggleBtn.setAttribute('aria-label', isDark ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro');
        };

        themeToggleBtn?.addEventListener('click', () => {
            const willUseDark = !root.classList.contains('dark');
            root.classList.toggle('dark', willUseDark);
            root.classList.toggle('light', !willUseDark);
            localStorage.setItem('theme', willUseDark ? 'dark' : 'light');
            syncThemeButton();
        });

        if (isStandalone) {
            document.body.classList.add('standalone-mode');
            header.classList.remove('hidden');
            main.classList.remove('min-h-screen');
            main.classList.add('min-h-[calc(100vh-73px)]');
        }

        syncThemeButton();

        const canvas = document.querySelector('#unity-canvas');
        const buildUrl = 'Build';
        const loaderUrl = buildUrl + '/rosco-express.loader.js';

        const config = {
            dataUrl: buildUrl + '/rosco-express.data',
            frameworkUrl: buildUrl + '/rosco-express.framework.js',
            codeUrl: buildUrl + '/rosco-express.wasm',
            streamingAssetsUrl: 'StreamingAssets',
            companyName: 'Menteando',
            productName: 'rosco-express',
            productVersion: '1.0',
            showBanner: () => {},
            matchWebGLToCanvasSize: false
        };

        canvas.width = 1280;
        canvas.height = 720;

        const script = document.createElement('script');
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config).then(() => {
                document.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'f') {
                        canvas.requestFullscreen();
                    }
                });
            }).catch(alert);
        };

        document.body.appendChild(script);
    </script>
</body>

</html>
