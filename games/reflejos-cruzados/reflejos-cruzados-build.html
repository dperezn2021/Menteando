<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, email=no">
    <meta name="apple-mobile-web-app-capable" content="yes">    <title>
        Reflejos Cruzados</title>
    <link rel="icon" href="../../assets/img/logo_1.png" type="image/png" sizes="32x32">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            background: #000;
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/catalogoJuegos.js"></script>
    <script src="../../js/perfil.js"></script>
    <script src="../../js/storage.js"></script>
    <script src="../../js/datosPerfil.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/reflejos-cruzados.loader.js";
        const config = {
            dataUrl: buildUrl + "/reflejos-cruzados.data.unityweb",
            frameworkUrl: buildUrl + "/reflejos-cruzados.framework.js.unityweb",
            codeUrl: buildUrl + "/reflejos-cruzados.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Menteando",
            productName: "Doble Canal",
            productVersion: "1.0",
            showBanner: () => { }
        };
        const canvas = document.querySelector("#unity-canvas");
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => { createUnityInstance(canvas, config).catch(alert); };
        document.body.appendChild(script);
    </script>
</body>

</html>
