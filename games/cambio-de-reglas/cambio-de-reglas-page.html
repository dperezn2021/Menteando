<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Menteando - Cambio de Reglas">
    <meta name="keywords" content="menteando, Cambio de Reglas, atencion dividida, reflejos">
    <meta name="author" content="Daniel Perez Navarro">
    <title>Menteando | Cambio de Reglas</title>
    <link rel="icon" href="../../assets/img/logo_1.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="../../css/unity-clean.css">

    <script>
        (() => {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const useDark = storedTheme ? storedTheme === 'dark' : prefersDark;
            document.documentElement.classList.toggle('dark', useDark);
            document.documentElement.classList.toggle('light', !useDark);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../js/catalogoJuegos.js"></script>
    <script src="../../js/perfil.js"></script>
    <script src="../../js/storage.js"></script>

    <script src="../../js/datosPerfil.js"></script>
    <script src="../../js/gameDetailPage.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#3b82f6', secondary: '#6366f1', accent: '#f59e0b' }
                    }
                }
            }
        }
    </script>
    <script defer src="../../js/header.js"></script>
</head>

<body class="bg-neutral-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-sans antialiased overflow-x-hidden">
    <header class="header-auto-hide w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3 lg:py-4 flex flex-col lg:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 flex-shrink-0">
                <img id="game-logo" src="../../assets/img/logo_1.png" alt="Logo del juego" class="w-10 h-10 md:w-12 md:h-12 rounded-xl object-cover" />
                <div class="flex flex-col leading-tight text-left">
                    <h1 id="game-title" class="text-3xl font-bold text-slate-900 dark:text-white">Cambio de Reglas</h1>
                    <p id="game-subtitle" class="text-xs md:text-sm font-normal text-slate-500 dark:text-slate-300">Ficha del juego</p>
                </div>
            </div>

            <nav class="flex flex-row items-center justify-center gap-2 md:gap-3">
                <a href="../../games.html" class="inline-flex items-center justify-center px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-semibold hover:border-blue-500 hover:text-blue-500 transition-colors">Volver a Juegos</a>
            </nav>

            <div class="flex items-center gap-3">
                <a href="../../perfil.html" class="flex items-center gap-2">
                    <span id="perfil-apodo-header" class="text-md md:text-xl font-normal text-slate-500 dark:text-slate-300"></span>
                    <div class="w-10 h-10 md:w-12 md:h-12 rounded-full overflow-hidden border-2 border-blue-500 bg-blue-500/10 flex items-center justify-center">
                        <img id="perfil-avatar-header" src="../../assets/icon/usuario.webp" alt="Avatar de usuario" class="w-full h-full object-cover" />
                    </div>
                </a>
                <button id="theme-toggle-btn" class="text-lg md:text-2xl text-slate-900 dark:text-white hover:text-blue-500 transition-colors" type="button" aria-label="Cambiar tema"></button>
            </div>
        </div>
    </header>

    <main id="game-detail-content"></main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initGameDetailPage('cambio-de-reglas');
        });
    </script>
</body>
</html>
